<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="DeepSeek R1"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme:light)"/>
<meta name="theme-color" content="#0c0c0c" media="(prefers-color-scheme:dark)"/>
<title>DeepSeek R1 — A-Store</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0c0c0c;--ink-2:#1a1a1a;--ink-3:#404040;--ink-4:#737373;--ink-5:#a3a3a3;--paper:#fff;--paper-2:#fafafa;--paper-3:#f5f5f5;--line:#e5e5e5;--line-2:#d4d4d4;--acc:#b91c1c;--acc-dim:#fff1f2;--acc-ring:#fecdd3;--go:#16a34a;--stop:#dc2626;--sh:0 1px 2px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--ink:#fafafa;--ink-2:#e5e5e5;--ink-3:#a3a3a3;--ink-4:#737373;--ink-5:#525252;--paper:#0c0c0c;--paper-2:#141414;--paper-3:#1c1c1c;--line:#262626;--line-2:#333;--acc:#f87171;--acc-dim:#2d0a0a;--acc-ring:#7f1d1d;--sh:0 1px 2px rgba(0,0,0,.5)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Instrument Sans',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--line);flex-shrink:0}
.h-left{display:flex;align-items:center;gap:.6rem}
.h-ico svg{display:block}
.h-name{font-size:.95rem;font-weight:700;letter-spacing:-.02em}
.h-by{font-size:.67rem;color:var(--ink-5);font-family:'Instrument Mono',monospace;margin-top:1px}
.h-right{display:flex;align-items:center;gap:.4rem}
.h-badge{font-family:'Instrument Mono',monospace;font-size:.58rem;font-weight:500;padding:.15rem .4rem;border-radius:100px;background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-ring)}
.h-clear{width:26px;height:26px;background:transparent;border:1px solid var(--line);border-radius:6px;color:var(--ink-5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .15s}
.h-clear:hover{color:var(--stop);border-color:var(--stop)}
.h-link{font-size:.7rem;font-weight:500;color:var(--ink-4);text-decoration:none;border:1px solid var(--line);padding:.25rem .55rem;border-radius:6px}
.h-link:hover{background:var(--paper-3)}
.usage-line{height:2px;background:var(--line);flex-shrink:0}
.usage-fill{height:100%;background:var(--acc);transition:width .4s ease}
/* THINK TOGGLE */
.think-bar{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.25rem;border-bottom:1px solid var(--line);background:var(--paper-2);flex-shrink:0}
.think-label{font-family:'Instrument Mono',monospace;font-size:.65rem;color:var(--ink-4);text-transform:uppercase;letter-spacing:.06em}
.think-toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer}
.toggle-track{width:32px;height:18px;background:var(--line-2);border-radius:100px;position:relative;transition:background .2s}
.toggle-track.on{background:var(--acc)}
.toggle-thumb{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle-track.on .toggle-thumb{transform:translateX(14px)}
.toggle-text{font-size:.72rem;color:var(--ink-4);font-weight:500}
.msgs{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.875rem}
.msgs::-webkit-scrollbar{width:2px}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.875rem;padding:2rem 1rem}
.w-ico{margin:0 auto .25rem}
.w-ico svg{display:block}
.w-title{font-size:1.05rem;font-weight:700;letter-spacing:-.025em}
.w-sub{font-size:.82rem;color:var(--ink-4);line-height:1.65;max-width:280px}
.w-sugs{display:flex;flex-direction:column;gap:.4rem;width:100%;max-width:340px;margin-top:.25rem}
.sug{background:transparent;border:1px solid var(--line);padding:.58rem .875rem;text-align:left;cursor:pointer;font-size:.78rem;color:var(--ink-3);transition:all .15s;font-family:'Instrument Sans',sans-serif;border-radius:8px;line-height:1.5}
.sug:hover{background:var(--acc-dim);border-color:var(--acc-ring);color:var(--acc)}
.msg{display:flex;gap:.5rem;align-items:flex-start;animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.m-av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg.user .m-av{background:var(--ink)}
.msg.ai .m-av{background:var(--acc-dim);border:1px solid var(--acc-ring)}
.m-av svg{display:block}
.m-wrap{max-width:84%}
.m-bub{padding:.62rem .875rem;font-size:.85rem;line-height:1.65;word-break:break-word;position:relative}
.msg.user .m-bub{background:var(--ink);color:var(--paper);border-radius:10px 10px 3px 10px}
.msg.ai .m-bub{background:var(--paper-2);border:1px solid var(--line);color:var(--ink-3);border-radius:10px 10px 10px 3px}
.msg.ai .m-bub strong{color:var(--ink-2)}
.m-time{font-family:'Instrument Mono',monospace;font-size:.56rem;color:var(--ink-5);margin-top:.2rem;display:block}
.m-copy{position:absolute;top:.3rem;right:.35rem;font-size:.56rem;color:var(--ink-5);background:none;border:none;cursor:pointer;opacity:0;transition:opacity .15s;padding:.1rem .28rem;border-radius:4px}
.m-bub:hover .m-copy{opacity:1}
/* THINKING BLOCK — collapsible */
.think-block{border:1px solid var(--acc-ring);border-radius:8px;margin-bottom:.5rem;overflow:hidden}
.think-head{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--acc-dim);cursor:pointer;user-select:none}
.think-head-label{font-family:'Instrument Mono',monospace;font-size:.62rem;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:.4rem}
.think-arrow{font-size:.6rem;color:var(--acc);transition:transform .2s}
.think-arrow.open{transform:rotate(180deg)}
.think-body{display:none;padding:.6rem .75rem;font-size:.75rem;color:var(--acc);font-family:'Instrument Mono',monospace;line-height:1.65;background:var(--acc-dim);border-top:1px solid var(--acc-ring);max-height:200px;overflow-y:auto;white-space:pre-wrap}
.think-body.open{display:block}
.typing{display:flex;gap:.5rem;align-items:center}
.t-bub{display:flex;gap:4px;align-items:center;background:var(--paper-2);border:1px solid var(--line);padding:.5rem .875rem;border-radius:10px 10px 10px 3px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink-4);animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.err-bub{background:var(--paper-2);border:1px solid var(--line);color:var(--stop);padding:.6rem .875rem;border-radius:10px;font-size:.78rem;max-width:82%}
.thinking-status{font-size:.72rem;color:var(--acc);font-family:'Instrument Mono',monospace;padding:.4rem .875rem;margin-bottom:.3rem;display:none}
.input-area{padding:.75rem 1.25rem .9rem;border-top:1px solid var(--line);background:var(--paper);flex-shrink:0}
.input-row{display:flex;gap:.5rem;align-items:flex-end}
.txt-in{flex:1;background:var(--paper-2);border:1px solid var(--line-2);border-radius:8px;padding:.62rem .875rem;font-family:'Instrument Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color .15s;line-height:1.5}
.txt-in::placeholder{color:var(--ink-5)}.txt-in:focus{border-color:var(--acc);background:var(--paper)}
.btn-send{background:var(--acc);border:none;color:#fff;width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-send:hover{opacity:.9;transform:translateY(-1px)}.btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-send svg{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="h-left">
      <div class="h-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
          <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
        </svg>
      </div>
      <div><div class="h-name">DeepSeek R1</div><div class="h-by">by DeepSeek AI</div></div>
    </div>
    <div class="h-right">
      <span class="h-badge">REASONING</span>
      <button class="h-clear" id="clearBtn">✕</button>
      <a href="https://a-store-ishraq.vercel.app" class="h-link">A-Store</a>
    </div>
  </div>
  <div class="usage-line"><div class="usage-fill" id="uf" style="width:0%"></div></div>
  <div class="think-bar">
    <span class="think-label">Show Reasoning</span>
    <div class="think-toggle" id="thinkToggle">
      <div class="toggle-track on" id="toggleTrack"><div class="toggle-thumb"></div></div>
      <span class="toggle-text" id="toggleText">On</span>
    </div>
  </div>
  <div class="msgs" id="msgs">
    <div class="welcome" id="wc">
      <div class="w-ico">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
          <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
        </svg>
      </div>
      <div class="w-title">DeepSeek R1</div>
      <div class="w-sub">Reasoning AI that shows its thinking. Best for complex problems.</div>
      <div class="w-sugs" id="sugs">
        <button class="sug">If a train travels 120km in 2 hours, what time does it arrive if it leaves at 9:45 AM?</button>
        <button class="sug">What are the trade-offs between SQL and NoSQL databases?</button>
        <button class="sug">Explain why 0.1 + 0.2 ≠ 0.3 in programming</button>
        <button class="sug">Should I use React or plain JavaScript for a small project?</button>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea class="txt-in" id="ti" placeholder="Ask a complex question..." rows="1"></textarea>
      <button class="btn-send" id="sb">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
var API='https://jzqmjvxwtguaubsfklpf.supabase.co/functions/v1/chat';
var DL=50,UK='deepseek_v1';
var msgs=[],loading=false,showThinking=true;

function getU(){var t=new Date().toDateString();var s=JSON.parse(localStorage.getItem(UK)||'{}');return s.date===t?(s.count||0):0;}
function addU(){var c=getU()+1;localStorage.setItem(UK,JSON.stringify({date:new Date().toDateString(),count:c}));uUI(c);}
function uUI(c){var p=Math.min((c/DL)*100,100);document.getElementById('uf').style.width=p+'%';}

document.getElementById('thinkToggle').addEventListener('click',function(){
  showThinking=!showThinking;
  var track=document.getElementById('toggleTrack');
  var txt=document.getElementById('toggleText');
  track.classList.toggle('on',showThinking);
  txt.textContent=showThinking?'On':'Off';
});

document.getElementById('clearBtn').addEventListener('click',function(){msgs=[];document.getElementById('msgs').innerHTML='<div class="welcome" id="wc"><div class="w-ico"><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg></div><div class="w-title">DeepSeek R1</div><div class="w-sub">Reasoning AI that shows its thinking.</div></div>';});
document.getElementById('sugs').addEventListener('click',function(e){var btn=e.target.closest('.sug');if(!btn)return;document.getElementById('ti').value=btn.textContent.trim();send();});
document.getElementById('ti').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('ti').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
document.getElementById('sb').addEventListener('click',send);

function fmt(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function userAv(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';}
function aiAv(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b91c1c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>';}

var thinkCount=0;
function renderMsg(role,text,thinking){
  var c=document.getElementById('msgs');
  var w=document.getElementById('wc');if(w)w.remove();
  var isU=role==='user';
  var d=document.createElement('div');d.className='msg '+(isU?'user':'ai');
  var html=isU?escH(text):text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  var avBg=isU?'background:#0c0c0c':'background:var(--acc-dim);border:1px solid var(--acc-ring)';
  var thinkHtml='';
  if(!isU&&thinking&&thinking.trim()&&showThinking){
    var tid='think-'+(++thinkCount);
    thinkHtml='<div class="think-block"><div class="think-head" onclick="toggleThink(\''+tid+'\')"><span class="think-head-label">⚙ Reasoning <span style="opacity:.6;font-size:.55rem">('+Math.ceil(thinking.length/5)+' tokens)</span></span><span class="think-arrow" id="arr-'+tid+'">▼</span></div><div class="think-body" id="'+tid+'">'+escH(thinking.trim())+'</div></div>';
  }
  d.innerHTML='<div class="m-av" style="'+avBg+'">'+( isU?userAv():aiAv())+'</div><div class="m-wrap"><div class="m-bub">'+thinkHtml+html+(isU?'':'<button class="m-copy" data-copy>copy</button>')+'</div><span class="m-time">'+fmt()+'</span></div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
window.toggleThink=function(id){var el=document.getElementById(id);var arr=document.getElementById('arr-'+id);if(el){el.classList.toggle('open');if(arr)arr.classList.toggle('open',el.classList.contains('open'));}};
document.getElementById('msgs').addEventListener('click',function(e){var btn=e.target.closest('[data-copy]');if(!btn)return;var text=btn.closest('.m-bub').innerText.replace('copy','').trim();navigator.clipboard&&navigator.clipboard.writeText(text).then(function(){btn.textContent='✓';setTimeout(function(){btn.textContent='copy';},1500);});});
function showTyping(){var c=document.getElementById('msgs');var d=document.createElement('div');d.className='typing';d.id='typ';d.innerHTML='<div class="m-av" style="background:var(--acc-dim);border:1px solid var(--acc-ring)">'+aiAv()+'</div><div class="t-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}
function hideTyping(){var el=document.getElementById('typ');if(el)el.remove();}
function showErr(text){var c=document.getElementById('msgs');var d=document.createElement('div');d.className='msg ai';d.innerHTML='<div class="m-av" style="background:var(--paper-3);border:1px solid var(--line)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="err-bub">'+escH(text)+'</div></div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}

async function send(){
  var ti=document.getElementById('ti');var text=ti.value.trim();
  if(!text||loading)return;
  if(getU()>=DL){showErr('Daily limit (50) reached. Come back tomorrow.');return;}
  ti.value='';ti.style.height='auto';loading=true;document.getElementById('sb').disabled=true;
  msgs.push({role:'user',content:text});renderMsg('user',text);showTyping();
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:'You are DeepSeek R1, a reasoning AI. Think carefully through problems step by step.'}].concat(msgs),model:'deepseek-r1-distill-llama-70b'})});
    hideTyping();
    if(!res.ok){var e=await res.json().catch(function(){return{};});showErr('Error '+res.status+': '+(e.error||'Try again.'));msgs.pop();return;}
    var data=await res.json();
    var full=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'No response.';
    var reasoning=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.reasoning_content)||'';
    var thinking=reasoning;var mainReply=full;
    if(!thinking){var m=full.match(/<think>([\s\S]*?)<\/think>/i);if(m){thinking=m[1];mainReply=full.replace(/<think>[\s\S]*?<\/think>/i,'').trim();}}
    msgs.push({role:'assistant',content:full});renderMsg('ai',mainReply,thinking);addU();
    if(msgs.length>20)msgs=msgs.slice(-20);
  }catch(e){hideTyping();showErr('Network error.');msgs.pop();}
  finally{loading=false;document.getElementById('sb').disabled=false;document.getElementById('ti').focus();}
}
uUI(getU());
</script>
</body>
  </html>
